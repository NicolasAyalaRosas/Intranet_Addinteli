<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet Addinteli</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../Glosario/style_glosario.css">
</head>
<body>
    <header class="static-header">
        <img src="../Imagenes_y_Archivos/Logo_Addinteli_2.png" alt="Logo Addinteli" class="logo">
        <div class="menu-hamburguesa">
            <button id="menu-toggle" aria-label="Abrir menú de navegación">☰ Menú</button>
            <ul class="menu-desplegable" id="menu-desplegable">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../Analizador_HSS/HSS_Analizador.html">Analizador HSS</a></li>
                <li><a href="../Procesos y Manuales/procesos y manuales.html">Documentos de Apoyo</a></li>
                <li><a href="../Guias Rapidas/guiasrapidas.html">Guias Rápidas</a></li>
                <li><a href="../Registros/Registros.html">Plantillas</a></li>
                <li><a href="../Roaming Internacional/Roaming_internacional.html">Roaming Internacional</a></li>
                <li><a href="../Sitios MBB/SitiosMBB.html">Sitios MBB</a></li> 
            </ul>
        </div>
    </header>

    <main class="content">
        <div class="glosario-container">
              <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar en el glosario...">
                <button id="clearSearch" title="Limpiar búsqueda">❌</button>
              </div>
            <dl>
                <!-- Términos se renderizan dinámicamente via app_glosario.js -->
            </dl>
        </div>
        <div id="volver-arriba">
            <a href="#top">Volver arriba ↑</a>
        </div>
    </main>

    <footer class="static-footer">
        <p>&copy; 2025 Intranet Corporativa. Todos los derechos reservados.</p>
    </footer>

    <script src="../Glosario/app.js"></script>
    <script src="../Glosario/glosario.js"></script>
    <script>
        // Toggle del menú hamburguesa
        document.getElementById('menu-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            const menu = document.getElementById('menu-desplegable');
            menu.classList.toggle('mostrar');
        });

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu-desplegable');
            const menuButton = document.getElementById('menu-toggle');
            if (!menu.contains(e.target) && !menuButton.contains(e.target)) {
                menu.classList.remove('mostrar');
            }
        });
    </script>
</body>
</html>
