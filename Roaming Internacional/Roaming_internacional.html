<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaming Internacional</title>
    <link rel="stylesheet" href="style_mapa.css"> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header>
        <img src="../Imagenes_y_Archivos/Logo Addinteli 2.png" alt="Logo de la Intranet" class="logo">
        <ul id="barradenavegacion">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../Glosario/glosario.html">Glosario</a></li>
                <li><a href="../Guias Rapidas/guiasrapidas.html">Guias rapidas</a></li>
                <li><a href="../Procesos y Manuales/procesos y manuales.html">Procesos y Manuales</a></li>
                <li><a href="../Sitios MBB/SitiosMBB.html">Sitios MBB</a></li>
                <li><a href="../Roaming Internacional/Roaming_internacional.html">Roaming Internacional</a></li>
        </ul>
    </header>

    <main class="content"> <!-- Clase para fondo y centrado -->
        <h1>Roaming Internacional</h1>

        <div class="formulario-busqueda"> <!-- Clase para estilos flex -->
            <label for="pais-input">Buscar país:</label> <!-- Label con for para accesibilidad -->
            <input type="text" id="pais-input" list="paises-sugeridos" placeholder="Escribe un país para buscar"> <!-- ID y list para JS -->
            <datalist id="paises-sugeridos">
                <!-- Opciones se llenan dinámicamente via JS desde paises_sugerencias.js -->
            </datalist>

            <button type="button" id="btnBuscar">Buscar</button> <!-- type e ID para JS -->
            <button type="button" id="btnLimpiar">Limpiar</button>
        </div>

        <div id="resultados"></div> <!-- Para mensajes dinámicos, e.g., "No se encontró el país" -->

        <div id="map"></div> <!-- Mapa para resaltar países -->

        <div class="tabla-resultados-container"> <!-- Contenedor para overflow -->
            <table id="tabla-resultados"> <!-- ID para JS y CSS -->
                <thead>
                    <tr>
                        <th>País</th>
                        <th>TADIG</th>
                        <th>Connection</th>
                        <th>Operador</th>
                        <th>Service Type</th>
                        <th>Country Code</th>
                        <th>MCC</th>
                        <th>IMSI Roamability</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas se poblarán dinámicamente via app_mapa.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Scripts al final para carga eficiente -->
    <script src="../Roaming Internacional/paises_sugerencias.json"></script>
    <script src="../Roaming Internacional/Paises_Roaming_Internacional.json"></script>
    <script src="../Roaming Internacional/world_geojson.js"></script>
    <script src="../Roaming Internacional/app_mapa.js"></script>
</body>
</html>
