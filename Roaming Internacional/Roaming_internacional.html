<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaming Internacional</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../Roaming Internacional/style_mapa.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header class="static-header">
        <img src="../Imagenes_y_Archivos/Logo_Addinteli_2.png" alt="Logo de la Intranet" class="logo">
        <div class="menu-hamburguesa">
            <button id="menu-toggle" aria-label="Abrir menú de navegación">☰ Menú</button>
            <ul class="menu-desplegable" id="menu-desplegable">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../Analizador_HSS/HSS_Analizador.html">Analizador HSS</a></li>
                <li><a href="../Procesos y Manuales/procesos y manuales.html">Documentos de Apoyo</a></li>
                <li><a href="../Guias Rapidas/guiasrapidas.html">Guías rápidas</a></li>
                <li><a href="../Glosario/glosario.html">Glosario</a></li>
                <li><a href="../Registros/Registros.html">Plantillas</a></li>
                <li><a href="../Sitios MBB/SitiosMBB.html">Sitios MBB</a></li>
            </ul>
        </div>
    </header>

    <main class="content">
        <h1>Roaming Internacional</h1>

        <div class="formulario-busqueda">
            <label for="pais-input">Buscar país:</label>
            <input type="text" id="pais-input" list="paises-sugeridos" placeholder="Escribe un país para buscar">
            <datalist id="paises-sugeridos">
                <!-- Opciones se llenan dinámicamente via JS desde paises_sugerencias.js -->
            </datalist>
            <button type="button" id="btnBuscar">Buscar</button>
            <button type="button" id="btnLimpiar">Limpiar</button>
        </div>

        <div id="resultados"></div>

        <div id="map"></div>

        <div class="tabla-resultados-container">
            <table id="tabla-resultados">
                <thead>
                    <tr>
                        <th>País</th>
                        <th>TADIG</th>
                        <th>Connection</th>
                        <th>Operador</th>
                        <th>Service Type</th>
                        <th>Country Code</th>
                        <th>MCC</th>
                        <th>IMSI Roamability</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Filas se poblarán dinámicamente via app_mapa.js -->
                </tbody>
            </table>
        </div>
    </main>

    <footer class="static-footer">
        <p>&copy; 2025 Intranet Corporativa. Todos los derechos reservados.</p>
    </footer>

    <script src="../Roaming Internacional/paises_sugerencias.json"></script>
    <script src="../Roaming Internacional/Paises_Roaming_Internacional.json"></script>
    <script src="../Roaming Internacional/world_geojson.js"></script>
    <script src="../Roaming Internacional/app_mapa.js"></script>
    <script>
        // Toggle del menú hamburguesa
        document.getElementById('menu-toggle').addEventListener('click', (e) => {
            e.stopPropagation(); // Evita que el clic en el botón cierre el menú
            const menu = document.getElementById('menu-desplegable');
            menu.classList.toggle('mostrar');
        });

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu-desplegable');
            const menuButton = document.getElementById('menu-toggle');
            if (!menu.contains(e.target) && !menuButton.contains(e.target)) {
                menu.classList.remove('mostrar');
            }
        });
    </script>
</body>
</html>
