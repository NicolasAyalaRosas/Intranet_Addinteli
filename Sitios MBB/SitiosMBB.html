<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intranet Addinteli</title>

    <!-- Tu CSS local -->
    <link rel="stylesheet" href="style_sitios.css" />

    <!-- Leaflet CSS sin integrity ni crossorigin -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
    
<body>
    <header>
        <img src="../Imagenes_y_Archivos/Logo Addinteli 2.png" alt="Logo Addinteli" class="logo" />
        <nav>
            <ul id="barradenavegacion">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="../Glosario/glosario.html">Glosario</a></li>
                <li><a href="../Guias Rapidas/guiasrapidas.html">Guias rapidas</a></li>
                <li><a href="../Procesos y Manuales/procesos y manuales.html">Procesos y Manuales</a></li>
            </ul>
        </nav>
    </header>

    <main class="content">
        <h1>Búsqueda de "Torres / Estaciones Base" por Coordenadas</h1>

        <div class="formulario-busqueda">
            <label for="coord-input">Coordenadas (latitud,longitud):</label>
            <input type="text" id="coord-input" placeholder="Ej. 19.4326,-99.1332" />

            <label for="radio-select">Radio (km):</label>
            <select id="radio-select">
                <option value="1" selected>1 km</option>
                <option value="2">2 km</option>
                <option value="5">5 km</option>
                <option value="10">10 km</option>
            </select>
            
            <button id="btnBuscar">Buscar</button>
            <button id="btnLimpiar">Limpiar</button>
        </div>

        <p id="resultados">Antenas encontradas: 0</p>

        <div id="map" style="height: 500px; margin-bottom: 20px;"></div>

        <div class="tabla-resultados-container">
            <table id="tabla-resultados" border="1">
                <thead>
                    <tr>
                        <th>CLAVE</th>
                        <th>UBICACIÓN</th>
                        <th>ESTADO</th>
                        <th>MUNICIPIO</th>
                        <th>POBLACION</th>
                        <th>LATITUD</th>
                        <th>LONGITUD</th>
                        <th>CP</th>
                        <th>TX</th>
                        <th>EN HUELLA MBB</th>
                        <th>SECTORES</th>
                        <th>USUARIOS ACTIVOS MBB</th>
                        <th>THP MBB (Mbps)</th>
                        <th>DISTANCIA (km)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Antenas data must define `dataAntenas` variable -->
    <script src="../Material_de_Apoyo/Addinteli/Antenas.json"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="app_sitios.js"></script>
</body>
</html>
